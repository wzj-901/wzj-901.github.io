<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>通知测试</title>
</head>
<body>
    <h2>系统通知测试</h2>
    <div id="status">状态: 等待</div>
    <div id="count">通知次数: 0</div>
    <button onclick="ask()">请求权限</button>
    <button onclick="test()">测试</button>

    <script>
        let count = 0;
        
        // 自动请求权限
        window.onload = function() {
            if ("Notification" in window && Notification.permission === "default") {
                ask();
            }
        };
        
        // 请求权限
        function ask() {
            if (!("Notification" in window)) {
                alert("不支持通知");
                return;
            }
            Notification.requestPermission().then(p => {
                document.getElementById("status").textContent = "状态: " + p;
            });
        }
        
        // 测试通知
        function test() {
            if (Notification.permission !== "granted") {
                alert("没权限");
                return;
            }
            new Notification("测试", {body: "这是测试通知"});
            count++;
            document.getElementById("count").textContent = "通知次数: " + count;
        }
        
        // 页面隐藏检测
        let timer = null;
        document.addEventListener("visibilitychange", function() {
            if (document.hidden) {
                // 页面隐藏
                timer = setTimeout(function() {
                    if (document.hidden && Notification.permission === "granted") {
                        new Notification("离开页面", {body: "你已经离开3秒了"});
                        count++;
                        document.getElementById("count").textContent = "通知次数: " + count;
                    }
                }, 3000);
            } else {
                // 页面显示
                if (timer) clearTimeout(timer);
            }
        });
    </script>
</body>
</html>
