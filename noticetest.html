<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>通知调试 - Service Worker 版</title>
</head>
<body>
    <h1>页面隐藏 3 秒通知调试（必须用 Service Worker）</h1>
    
    <button onclick="requestPermission()">1. 请求通知权限</button>
    <button onclick="registerSW()">2. 注册 Service Worker</button>
    <button onclick="testNow()">3. 立即测试通知</button>
    <button onclick="clearLog()">清空日志</button>

    <h2>当前状态</h2>
    <pre id="status">等待操作...</pre>

    <h2>详细日志</h2>
    <pre id="log" style="background:#000;color:#0f0;padding:15px;height:500px;overflow:auto;font-family:monospace;white-space:pre-wrap;border:1px solid #333;"></pre>

    <script>
        let swRegistration = null;
        let timeoutId = null;

        const statusEl = document.getElementById('status');
        const logEl = document.getElementById('log');

        function log(msg, isError = false) {
            const time = new Date().toLocaleTimeString('zh-CN', {hour12: false});
            const prefix = isError ? '[ERROR]' : '[INFO] ';
            logEl.textContent += `${time} ${prefix} ${msg}\n`;
            logEl.scrollTop = logEl.scrollHeight;
        }

        function updateStatus(text) {
            statusEl.textContent = text;
        }

        async function requestPermission() {
            log('请求通知权限...');
            if (!('Notification' in window)) {
                log('浏览器不支持 Notification', true);
                return;
            }
            const perm = await Notification.requestPermission();
            log(`权限结果: ${perm}`);
            updateStatus(`权限: ${perm}`);
        }

        async function registerSW() {
            log('开始注册 Service Worker...');
            if (!('serviceWorker' in navigator)) {
                log('浏览器不支持 Service Worker', true);
                return;
            }

            try {
                // 内联一个最简 Service Worker
                const swScript = `
                    self.addEventListener('activate', () => {
                        self.clients.claim();
                    });
                `;
                const blob = new Blob([swScript], {type: 'text/javascript'});
                const url = URL.createObjectURL(blob);

                swRegistration = await navigator.serviceWorker.register(url, {scope: './'});
                log('Service Worker 注册成功');

                // 等待激活
                if (swRegistration.installing) {
                    swRegistration.installing.addEventListener('statechange', (e) => {
                        log(`SW 状态: ${e.target.state}`);
                    });
                }

                if (swRegistration.active) {
                    log('Service Worker 已激活');
                    updateStatus('SW 已就绪');
                }
            } catch (err) {
                log(`注册失败: ${err.message}`, true);
            }
        }

        async function showNotification() {
            if (!swRegistration) {
                log('Service Worker 未注册，无法发送通知', true);
                return;
            }
            if (Notification.permission !== 'granted') {
                log('没有通知权限', true);
                return;
            }

            try {
                await swRegistration.showNotification('页面已隐藏', {
                    body: '你已经离开此页面超过 3 秒了！',
                    icon: 'https://via.placeholder.com/128/667eea/ffffff?text=回来',
                    tag: 'hidden-page-debug',
                    requireInteraction: false
                });
                log('通知已通过 Service Worker 发送成功');
            } catch (err) {
                log(`发送通知失败: ${err.message}`, true);
            }
        }

        function testNow() {
            log('=== 手动立即测试通知 ===');
            showNotification();
        }

        function handleVisibilityChange() {
            clearTimeout(timeoutId);
            const hidden = document.visibilityState === 'hidden';
            log(`页面可见性变化: ${hidden ? '隐藏' : '可见'}`);

            if (hidden) {
                log('页面隐藏，3秒后发送通知...');
                timeoutId = setTimeout(() => {
                    log('3秒倒计时结束，开始发送通知');
                    showNotification();
                }, 3000);
            }
        }

        function clearLog() {
            logEl.textContent = '';
            log('日志已清空');
        }

        function init() {
            log('页面初始化完成');
            updateStatus('请依次点击按钮 1 → 2');

            if ('serviceWorker' in navigator) {
                log('浏览器支持 Service Worker');
            } else {
                log('不支持 Service Worker', true);
            }

            document.addEventListener('visibilitychange', handleVisibilityChange);
            log('已监听 visibilitychange 事件');
        }

        window.onload = init;
    </script>
</body>
</html>
